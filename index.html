<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Historical Challenges</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a;
    --accent: #e8ff00; --accent2: #ff3c00; --text: #f0f0f0;
    --muted: #666; --done: #39ff14; --undone: #ff3c00; --border: #2a2a2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 9999; }
  
  header { padding: 48px 40px 32px; border-bottom: 2px solid var(--accent); background: var(--bg); position: sticky; top: 0; z-index: 100; display: flex; align-items: flex-end; gap: 32px; flex-wrap: wrap; }
  .header-title { flex: 1; min-width: 260px; }
  
  .header-title .label { 
    font-size: clamp(14px, 1.6vw, 19px); 
    letter-spacing: 0.46em; 
    color: var(--accent); 
    text-transform: uppercase; 
    margin-top: 8px;
    font-weight: 700;
    line-height: 1;
    white-space: nowrap;
  }
  .header-title h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 6vw, 72px); line-height: 0.9; letter-spacing: 0.02em; color: var(--text); }
  
  .total-progress { text-align: right; min-width: 160px; }
  .total-progress .prog-label { font-size: 10px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .total-progress .prog-count { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--accent); line-height: 1; }
  .total-progress .prog-pct { font-size: 12px; color: var(--muted); }
  .progress-bar-wrap { width: 100%; height: 3px; background: var(--border); margin-top: 4px; }
  .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.8s ease; }

  nav { display: flex; gap: 4px; padding: 16px 40px; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; flex-wrap: wrap; }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.08em; padding: 8px 16px; cursor: pointer; white-space: nowrap; transition: all 0.15s; text-transform: uppercase; position: relative; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
  .nav-btn .nav-pct { display: block; font-size: 9px; opacity: 0.7; margin-top: 2px; }

  main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }
  .location-panel { display: none; }
  .location-panel.visible { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .loc-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
  .loc-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 7vw, 80px); line-height: 0.9; color: var(--text); }
  .loc-stats { display: flex; gap: 24px; align-items: center; }
  .loc-stat { text-align: center; }
  .loc-stat .val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); display: block; }
  .loc-stat .key { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.08em; padding: 5px 12px; cursor: pointer; text-transform: uppercase; }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); }
  .search-box { margin-left: auto; background: var(--bg2); border: 1px solid var(--border); color: var(--text); font-family: 'Space Mono', monospace; font-size: 11px; padding: 6px 12px; width: 200px; outline: none; }

  .challenge-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .challenge-table thead tr { border-bottom: 2px solid var(--accent); }
  .challenge-table th { font-size: 9px; color: var(--muted); padding: 10px 12px; text-align: left; text-transform: uppercase; }
  .challenge-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .challenge-table tbody tr:hover { background: var(--bg3); }
  
  /* Dim cells except the checkbox cell for CHECKED rows */
  .challenge-table tbody tr.done-row td:not(.done-cell) { opacity: 0.35; } 

  .challenge-table td { padding: 10px 12px; }

  .stance-badge { font-size: 9px; padding: 2px 7px; border: 1px solid; text-transform: uppercase; display: inline-block; }
  .stance-badge.regular { border-color: #4488ff; color: #4488ff; }
  .stance-badge.goofy { border-color: #ff8844; color: #ff8844; }
  .stance-badge.any { border-color: var(--muted); color: var(--muted); }

  .done-checkbox { appearance: none; width: 18px; height: 18px; border: 2px solid var(--border); cursor: pointer; position: relative; transition: all 0.2s; }
  .done-checkbox:checked { 
    background: var(--done); 
    border-color: var(--done); 
    box-shadow: 0 0 12px var(--done); 
  }
  .done-checkbox:checked::after { content: '✓'; color: #000; position: absolute; left: 3px; top: -2px; font-weight: bold; }

  .home-panel { display: none; }
  .home-panel.visible { display: block; }
  .home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 24px; }
  .city-card { background: var(--bg2); border: 1px solid var(--border); padding: 24px; }
  .city-name { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); margin-bottom: 12px; }
  .city-location-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .loc-mini-bar { display: flex; align-items: center; gap: 8px; }
  .loc-mini-progress { width: 60px; height: 2px; background: var(--border); }
  .loc-mini-fill { height: 100%; background: var(--accent); }
  .loc-mini-fill.complete { background: var(--done); }
  .loc-mini-pct { font-size: 10px; color: var(--muted); min-width: 32px; text-align: right; }
  
  .total-row { background: var(--bg2); border: 2px solid var(--accent); padding: 24px; display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }
  .total-label { font-family: 'Bebas Neue', sans-serif; font-size: 28px; }
  .total-value { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); }
  
  .footer-actions { margin-top: 40px; text-align: center; border-top: 1px solid var(--border); padding-top: 20px; }
  .reset-btn { background: transparent; border: 1px solid var(--accent2); color: var(--accent2); font-family: 'Space Mono', monospace; font-size: 9px; padding: 6px 12px; cursor: pointer; text-transform: uppercase; opacity: 0.6; transition: 0.2s; }
  .reset-btn:hover { opacity: 1; background: rgba(255, 60, 0, 0.1); }

  .back-home-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; padding: 6px 16px; cursor: pointer; text-transform: uppercase; margin-bottom: 24px; }
  .time-link, .source-link { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
  .time-link:hover, .source-link:hover { border-bottom-color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Session<br><span>Historical</span></h1>
    <div class="label">Challenge Tracker</div>
  </div>
  <div class="total-progress">
    <div class="prog-label">Total Progress</div>
    <div class="prog-count">0 / 0</div>
    <div class="prog-pct">0% Complete</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width: 0%"></div>
    </div>
  </div>
</header>

<nav id="main-nav">
  <button class="nav-btn active" data-view="home">Home <span class="nav-pct">Overview</span></button>
  <button class="nav-btn" data-view="Lower Manhattan">Lower Manhattan <span class="nav-pct">...</span></button>
  <button class="nav-btn" data-view="Black Hubba">Black Hubbas <span class="nav-pct">...</span></button>
  <button class="nav-btn" data-view="Jerome Banks">Jerome Banks <span class="nav-pct">...</span></button>
  <button class="nav-btn" data-view="Les Coleman Park">Les Coleman Park <span class="nav-pct">...</span></button>
  <button class="nav-btn" data-view="Pyramid Ledges">Pyramid Ledges <span class="nav-pct">...</span></button>
  <button class="nav-btn" data-view="Philly">Philly <span class="nav-pct">...</span></button>
  <button class="nav-btn" data-view="China Banks">China Banks <span class="nav-pct">...</span></button>
  <button class="nav-btn" data-view="Pier 7">Pier 7 <span class="nav-pct">...</span></button>
  <button class="nav-btn" data-view="Global">Global <span class="nav-pct">...</span></button>
</nav>

<main>
  <div class="home-panel visible" id="view-home">
    <div class="home-grid">
      <div class="city-card">
        <div class="city-name">New York City</div>
        <div class="city-locations">
          <div class="city-location-row" onclick="showView('Lower Manhattan')"><span class="loc-link-name">Lower Manhattan</span><div class="loc-mini-bar"><div class="loc-mini-progress"><div class="loc-mini-fill"></div></div><span class="loc-mini-pct">0%</span></div></div>
          <div class="city-location-row" onclick="showView('Black Hubba')"><span class="loc-link-name">Black Hubbas</span><div class="loc-mini-bar"><div class="loc-mini-progress"><div class="loc-mini-fill"></div></div><span class="loc-mini-pct">0%</span></div></div>
          <div class="city-location-row" onclick="showView('Jerome Banks')"><span class="loc-link-name">Jerome Banks</span><div class="loc-mini-bar"><div class="loc-mini-progress"><div class="loc-mini-fill"></div></div><span class="loc-mini-pct">0%</span></div></div>
          <div class="city-location-row" onclick="showView('Les Coleman Park')"><span class="loc-link-name">Les Coleman Park</span><div class="loc-mini-bar"><div class="loc-mini-progress"><div class="loc-mini-fill"></div></div><span class="loc-mini-pct">0%</span></div></div>
          <div class="city-location-row" onclick="showView('Pyramid Ledges')"><span class="loc-link-name">Pyramid Ledges</span><div class="loc-mini-bar"><div class="loc-mini-progress"><div class="loc-mini-fill"></div></div><span class="loc-mini-pct">0%</span></div></div>
        </div>
      </div>
      <div class="city-card">
        <div class="city-name">Philly</div>
        <div class="city-locations">
          <div class="city-location-row" onclick="showView('Philly')"><span class="loc-link-name">Philly</span><div class="loc-mini-bar"><div class="loc-mini-progress"><div class="loc-mini-fill"></div></div><span class="loc-mini-pct">0%</span></div></div>
        </div>
      </div>
      <div class="city-card">
        <div class="city-name">San Francisco</div>
        <div class="city-locations">
          <div class="city-location-row" onclick="showView('China Banks')"><span class="loc-link-name">China Banks</span><div class="loc-mini-bar"><div class="loc-mini-progress"><div class="loc-mini-fill"></div></div><span class="loc-mini-pct">0%</span></div></div>
          <div class="city-location-row" onclick="showView('Pier 7')"><span class="loc-link-name">Pier 7</span><div class="loc-mini-bar"><div class="loc-mini-progress"><div class="loc-mini-fill"></div></div><span class="loc-mini-pct">0%</span></div></div>
        </div>
      </div>
      <div class="city-card">
        <div class="city-name">Global</div>
        <div class="city-locations">
          <div class="city-location-row" onclick="showView('Global')"><span class="loc-link-name">Global Challenges</span><div class="loc-mini-bar"><div class="loc-mini-progress"><div class="loc-mini-fill"></div></div><span class="loc-mini-pct">0%</span></div></div>
        </div>
      </div>
    </div>
    <div class="total-row"><span class="total-label">Total Progress</span><span class="total-value">0 / 0 — 0%</span></div>
    
    <div class="footer-actions">
      <button class="reset-btn" onclick="resetAllProgress()">Wipe Saved Progress</button>
    </div>
  </div>

  <div id="view-Lower Manhattan" class="location-panel"></div>
  <div id="view-Black Hubba" class="location-panel"></div>
  <div id="view-Jerome Banks" class="location-panel"></div>
  <div id="view-Les Coleman Park" class="location-panel"></div>
  <div id="view-Pyramid Ledges" class="location-panel"></div>
  <div id="view-Philly" class="location-panel"></div>
  <div id="view-China Banks" class="location-panel"></div>
  <div id="view-Pier 7" class="location-panel"></div>
  <div id="view-Global" class="location-panel"></div>
</main>

<script>
let DATA = {};
let currentKey = null;
let currentFilter = 'all';
let searchQuery = '';

const CSV_LOCATIONS = {
  'Lower Manhattan': 'data/' + encodeURIComponent('Lower Manhattan.csv'),
  'Black Hubba': 'data/' + encodeURIComponent('Black Hubba.csv'),
  'Jerome Banks': 'data/' + encodeURIComponent('Jerome Banks.csv'),
  'Les Coleman Park': 'data/' + encodeURIComponent('Les Coleman Park.csv'),
  'Pyramid Ledges': 'data/' + encodeURIComponent('Pyramid Ledges.csv'),
  'Philly': 'data/' + encodeURIComponent('Philly.csv'),
  'China Banks': 'data/' + encodeURIComponent('China Banks.csv'),
  'Pier 7': 'data/' + encodeURIComponent('Pier 7.csv'),
  'Global': 'data/' + encodeURIComponent('Global.csv')
};

const loadPromises = {};

function parseCsvLine(line) {
  const out = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) { if (c === '"') { if (line[i+1] === '"') { cur += '"'; i++; } else inQ = false; } else cur += c; }
    else { if (c === '"') inQ = true; else if (c === ',') { out.push(cur); cur = ''; } else cur += c; }
  }
  out.push(cur); return out.map(s => s.trim());
}

function escapeHtml(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function isHttpToken(s) { return /^https?:\/\//i.test(String(s || '').trim()); }

function parseLocationCsv(key, text) {
  const lines = text.split(/\r?\n/);
  let headerIdx = -1, col = null;
  for (let i = 0; i < lines.length; i++) {
    const cells = parseCsvLine(lines[i]);
    if (cells.includes('Time') && cells.includes('Stance')) {
      headerIdx = i; const idx = (n) => cells.indexOf(n);
      col = { num: idx('#'), time: idx('Time'), stance: idx('Stance'), skater: idx('Skater'), trick: idx('Trick'), location: idx('Location'), source: idx('Film Source'), done: idx('Done') };
      break;
    }
  }
  if (!col) return null;
  const rows = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const line = lines[i]; if (!line.trim()) continue;
    const cells = parseCsvLine(line);
    if (!cells[col.stance] || !cells[col.skater]) continue;
    const num = cells[col.num] || (rows.length + 1).toString().padStart(2, '0');
    
    // BLANK SLATE LOGIC: Ignore CSV 'Done' column. Pull only from user local memory.
    const saved = localStorage.getItem(`progress_${key}_${num}`);
    let doneVal = (saved !== null) ? parseInt(saved, 10) : 0; 

    rows.push({
      num, time: cells[col.time],
      link: isHttpToken(cells[col.time+1]) ? cells[col.time+1] : null,
      stance: cells[col.stance], skater: cells[col.skater], trick: cells[col.trick],
      location: col.location >= 0 ? cells[col.location] : '',
      source: cells[col.source] || '',
      sourceLink: isHttpToken(cells[col.source+1]) ? cells[col.source+1] : null,
      done: doneVal
    });
  }
  return { rows, total: rows.length, done_count: rows.filter(r => r.done === 1).length, _fromCsv: true };
}

async function ensureLocationLoaded(key) {
  if (!CSV_LOCATIONS[key] || (DATA[key] && DATA[key]._fromCsv)) return;
  if (!loadPromises[key]) {
    loadPromises[key] = fetch(CSV_LOCATIONS[key]).then(r => r.text()).then(text => { DATA[key] = parseLocationCsv(key, text); updateAllProgress(); }).catch(() => { loadPromises[key] = null; });
  }
  await loadPromises[key];
}

function updateAllProgress() {
  let gT = 0, gD = 0;
  Object.keys(DATA).forEach(k => { gT += DATA[k].total; gD += DATA[k].done_count; });
  const pct = gT > 0 ? (gD / gT * 100).toFixed(1) : 0;
  document.querySelector('.prog-count').textContent = `${gD} / ${gT}`;
  document.querySelector('.prog-pct').textContent = `${pct}% Complete`;
  document.querySelector('.progress-bar-fill').style.width = pct + '%';
  if(document.querySelector('.total-value')) document.querySelector('.total-value').textContent = `${gD} / ${gT} — ${pct}%`;
  document.querySelectorAll('.nav-btn').forEach(btn => {
    const v = btn.dataset.view;
    if (v !== 'home' && DATA[v]) {
      const p = Math.round((DATA[v].done_count / DATA[v].total) * 100);
      btn.querySelector('.nav-pct').textContent = `${DATA[v].done_count}/${DATA[v].total} — ${p}%`;
    }
  });
  document.querySelectorAll('.city-location-row').forEach(row => {
    const name = row.querySelector('.loc-link-name').textContent.trim();
    const match = Object.keys(DATA).find(k => name.includes(k) || k.includes(name));
    if (match && DATA[match]) {
      const p = (DATA[match].done_count / DATA[match].total) * 100;
      row.querySelector('.loc-mini-fill').style.width = p + '%';
      if (p >= 100) row.querySelector('.loc-mini-fill').classList.add('complete');
      else row.querySelector('.loc-mini-fill').classList.remove('complete');
      row.querySelector('.loc-mini-pct').textContent = Math.round(p) + '%';
    }
  });
  if (currentKey && DATA[currentKey]) {
    const panel = document.getElementById(`view-${currentKey}`);
    if (panel) {
      const vals = panel.querySelectorAll('.loc-stat .val');
      if (vals.length >= 3) {
        vals[0].textContent = DATA[currentKey].done_count;
        vals[1].textContent = DATA[currentKey].total - DATA[currentKey].done_count;
        vals[2].textContent = Math.round((DATA[currentKey].done_count / DATA[currentKey].total) * 100) + '%';
      }
    }
  }
}

function buildTable(rows, key) {
  let filtered = rows.filter(r => {
    if (currentFilter === 'done') return r.done === 1;
    if (currentFilter === 'undone') return r.done === 0;
    return true;
  });
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(r => r.skater.toLowerCase().includes(q) || r.trick.toLowerCase().includes(q));
  }
  let html = `<table class="challenge-table"><thead><tr><th>#</th><th>Time</th><th>Stance</th><th>Skater</th><th>Trick</th><th>Film Source</th><th>Done</th></tr></thead><tbody>`;
  filtered.forEach(r => {
    html += `<tr class="${r.done === 1 ? 'done-row' : ''}">
      <td>${r.num}</td>
      <td>${r.link ? `<a class="time-link" href="${r.link}" target="_blank">${r.time}</a>` : r.time}</td>
      <td><span class="stance-badge ${r.stance.toLowerCase()}">${r.stance}</span></td>
      <td>${r.skater}</td><td>${r.trick}</td>
      <td>${r.sourceLink ? `<a class="source-link" href="${r.sourceLink}" target="_blank">${r.source}</a>` : r.source}</td>
      <td class="done-cell"><input type="checkbox" class="done-checkbox" ${r.done === 1 ? 'checked' : ''} onchange="toggleDone('${key}','${r.num}',this)"></td>
    </tr>`;
  });
  return html + `</tbody></table>`;
}

function toggleDone(key, num, cb) {
  const row = DATA[key].rows.find(r => r.num === num);
  if (row) {
    row.done = cb.checked ? 1 : 0;
    localStorage.setItem(`progress_${key}_${num}`, row.done);
    DATA[key].done_count = DATA[key].rows.filter(r => r.done === 1).length;
    cb.closest('tr').classList.toggle('done-row', cb.checked);
    updateAllProgress();
  }
}

function resetAllProgress() {
  if (confirm("This will wipe all your saved progress and return to a blank slate. Are you sure?")) {
    localStorage.clear();
    location.reload();
  }
}

async function showView(view) {
  document.querySelectorAll('.home-panel, .location-panel').forEach(p => p.classList.remove('visible'));
  currentKey = view; currentFilter = 'all'; searchQuery = '';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  if (view === 'home') { document.getElementById('view-home').classList.add('visible'); } 
  else {
    const panel = document.getElementById(`view-${view}`);
    if (panel) {
      await ensureLocationLoaded(view);
      const loc = DATA[view];
      const pct = Math.round((loc.done_count / loc.total) * 100);
      panel.innerHTML = `
        <button class="back-home-btn" onclick="showView('home')">← Home</button>
        <div class="loc-header"><div class="loc-title">${view}</div><div class="loc-stats"><div class="loc-stat"><span class="val">${loc.done_count}</span><span class="key">Done</span></div><div class="loc-stat"><span class="val">${loc.total - loc.done_count}</span><span class="key">Remaining</span></div><div class="loc-stat"><span class="val">${pct}%</span><span class="key">Complete</span></div></div></div>
        <div class="filter-bar"><button class="filter-btn active" onclick="setFilter('all',this)">All</button><button class="filter-btn" onclick="setFilter('done',this)">Done</button><button class="filter-btn" onclick="setFilter('undone',this)">Remaining</button><input class="search-box" type="text" placeholder="Search..." oninput="setSearch(this.value)"></div>
        <div id="table-wrap-${view.replace(/\s/g,'_')}">${buildTable(loc.rows, view)}</div>`;
      panel.classList.add('visible');
    }
  }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const wrap = document.getElementById(`table-wrap-${currentKey.replace(/\s/g,'_')}`);
  if (wrap) wrap.innerHTML = buildTable(DATA[currentKey].rows, currentKey);
}

function setSearch(val) {
  searchQuery = val;
  const wrap = document.getElementById(`table-wrap-${currentKey.replace(/\s/g,'_')}`);
  if (wrap) wrap.innerHTML = buildTable(DATA[currentKey].rows, currentKey);
}

Object.keys(CSV_LOCATIONS).forEach(k => ensureLocationLoaded(k));
document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => showView(b.dataset.view)));
</script>
</body>
