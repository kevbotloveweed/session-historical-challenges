<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Historical Challenges</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a;
    --accent: #e8ff00; --accent2: #ff3c00; --text: #f0f0f0;
    --muted: #666; --done: #39ff14; --undone: #ff3c00; --border: #2a2a2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 9999; }
  
  header { padding: 48px 40px 32px; border-bottom: 2px solid var(--accent); background: var(--bg); position: sticky; top: 0; z-index: 1000; display: flex; align-items: flex-end; gap: 32px; flex-wrap: wrap; transition: transform 0.3s ease; }
  .header-title { flex: 1; min-width: 260px; }
  .header-title .label { font-size: clamp(14px, 1.6vw, 19px); letter-spacing: 0.46em; color: var(--accent); text-transform: uppercase; margin-top: 8px; font-weight: 700; line-height: 1; white-space: nowrap; }
  .header-title h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 6vw, 72px); line-height: 0.9; letter-spacing: 0.02em; color: var(--text); }
  .header-title h1 span { color: var(--accent); }
  
  .total-progress { text-align: right; min-width: 160px; cursor: pointer; transition: opacity 0.2s; }
  .total-progress:hover { opacity: 0.7; }
  .total-progress .prog-label { font-size: 10px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .total-progress .prog-count { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--accent); line-height: 1; }
  .total-progress .prog-pct { font-size: 12px; color: var(--muted); }
  .progress-bar-wrap { width: 100%; height: 3px; background: var(--border); margin-top: 4px; }
  .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.8s ease; }

  nav { display: flex; gap: 4px; padding: 16px 40px; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; flex-wrap: wrap; }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.08em; padding: 8px 16px; cursor: pointer; white-space: nowrap; transition: all 0.15s; text-transform: uppercase; position: relative; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
  .nav-btn .nav-pct { display: block; font-size: 9px; opacity: 0.7; margin-top: 2px; }

  main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; flex: 1; width: 100%; }
  .location-panel { display: none; }
  .location-panel.visible { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .spot-header-group { position: sticky; z-index: 900; background: var(--bg); transition: top 0.3s ease; padding-top: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-top: -16px; }
  
  .loc-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 16px; }
  .loc-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 7vw, 80px); line-height: 0.9; color: var(--text); text-transform: uppercase; word-break: break-word; }
  .loc-stats { display: flex; gap: clamp(16px, 3vw, 24px); align-items: center; flex-wrap: wrap; }
  .loc-stat { text-align: center; }
  .loc-stat .val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); display: block; }
  .loc-stat .key { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }

  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 16px; }
  .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.08em; padding: 5px 12px; cursor: pointer; text-transform: uppercase; }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); }
  .search-box { margin-left: auto; background: var(--bg2); border: 1px solid var(--border); color: var(--text); font-family: 'Space Mono', monospace; font-size: 11px; padding: 6px 12px; width: 200px; outline: none; }

  .challenge-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; margin-top: 10px; }
  .challenge-table th { position: sticky; z-index: 850; background: var(--bg); font-size: 9px; color: var(--muted); padding: 12px; text-align: left; text-transform: uppercase; cursor: pointer; user-select: none; transition: top 0.3s ease, color 0.15s; border-bottom: 2px solid var(--accent); }
  .challenge-table th:hover { color: var(--accent); }
  .challenge-table th.sorted { color: var(--accent); }
  .challenge-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .challenge-table tbody tr { transition: background 0.1s; }
  .challenge-table tbody tr:hover { background: var(--bg3); }
  .challenge-table tbody tr.done-row td:not(.done-cell) { opacity: 0.35; } 

  .sort-indicator { margin-left: 4px; opacity: 0.5; }
  .sort-indicator.active { opacity: 1; color: var(--accent); }

  .stance-badge { font-size: 9px; padding: 2px 7px; border: 1px solid; text-transform: uppercase; display: inline-block; }
  .stance-badge.regular { border-color: #4488ff; color: #4488ff; }
  .stance-badge.goofy { border-color: #ff8844; color: #ff8844; }
  .stance-badge.any { border-color: var(--muted); color: var(--muted); }

  .done-checkbox { appearance: none; width: 18px; height: 18px; border: 2px solid var(--border); cursor: pointer; position: relative; transition: all 0.2s; }
  .done-checkbox:checked { background: var(--done); border-color: var(--done); box-shadow: 0 0 12px var(--done); }
  .done-checkbox:checked::after { content: '✓'; color: #000; position: absolute; left: 3px; top: -2px; font-weight: bold; }

  .home-panel { display: none; }
  .home-panel.visible { display: block; }
  .home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 24px; }
  .city-card { background: var(--bg2); border: 1px solid var(--border); padding: 24px; }
  .city-name { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); margin-bottom: 12px; }
  .city-location-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .loc-mini-bar { display: flex; align-items: center; gap: 8px; }
  .loc-mini-progress { width: 60px; height: 2px; background: var(--border); }
  .loc-mini-fill { height: 100%; background: var(--accent); }
  .loc-mini-fill.complete { background: var(--done); }
  .loc-mini-pct { font-size: 10px; color: var(--muted); min-width: 32px; text-align: right; }
  
  .total-row { background: var(--bg2); border: 2px solid var(--accent); padding: 24px; display: flex; justify-content: space-between; align-items: center; margin-top: 24px; cursor: pointer; transition: opacity 0.2s; }
  .total-row:hover { opacity: 0.8; }
  .total-label { font-family: 'Bebas Neue', sans-serif; font-size: 28px; }
  .total-value { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); }
  
  .footer-actions { margin-top: 40px; text-align: center; border-top: 1px solid var(--border); padding-top: 30px; padding-bottom: 40px; width: 100%; }
  .action-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: 'Space Mono', monospace; font-size: 10px; padding: 8px 20px; cursor: pointer; text-transform: uppercase; transition: 0.2s; letter-spacing: 0.1em; }
  .action-btn:hover { background: var(--accent); color: #000; }
  .reset-btn { background: transparent; border: 1px solid var(--accent2); color: var(--accent2); font-family: 'Space Mono', monospace; font-size: 9px; padding: 6px 12px; cursor: pointer; text-transform: uppercase; opacity: 0.6; transition: 0.2s; margin-top: 16px; }
  .reset-btn:hover { opacity: 1; background: rgba(255, 60, 0, 0.1); }
  
  .back-home-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; padding: 6px 16px; cursor: pointer; text-transform: uppercase; transition: 0.15s; margin-bottom: 16px; display: inline-block;}
  .back-home-btn:hover { border-color: var(--accent); color: var(--accent); }
  .footer-nav { margin-top: 30px; padding: 20px 0; border-top: 1px solid var(--border); display: flex; justify-content: center; }

  .time-link, .source-link { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; cursor: pointer; }
  .time-link:hover, .source-link:hover { border-bottom-color: var(--accent); }

  /* CUSTOM MODAL CSS */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 99999; align-items: center; justify-content: center; backdrop-filter: blur(4px); cursor: pointer; }
  .modal-overlay.visible { display: flex; animation: fadeIn 0.2s; }
  .modal-content { background: var(--bg2); border: 2px solid var(--accent); padding: 32px; max-width: 500px; width: 90%; color: var(--text); font-family: 'Space Mono', monospace; cursor: default; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); letter-spacing: 0.05em; margin: 0; line-height: 1; }
  .close-modal { background: transparent; border: none; color: var(--muted); font-size: 20px; cursor: pointer; transition: 0.2s; font-family: 'Space Mono', monospace; }
  .close-modal:hover { color: var(--accent2); }
  .modal-desc { font-size: 11px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
  .modal-input { width: 100%; height: 100px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; font-family: monospace; font-size: 14px; text-align: center; margin-bottom: 24px; resize: none; outline: none; transition: border-color 0.15s; letter-spacing: 0.1em; word-wrap: break-word;}
  .modal-input:focus { border-color: var(--accent); }
  .modal-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 12px; font-family: 'Space Mono', monospace; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; letter-spacing: 0.1em; }
  .modal-btn:hover { background: #fff; }

  /* YT PLAYER MODAL CSS */
  #yt-modal { background: rgba(0,0,0,0.9); cursor: pointer; }
  .yt-modal-content { background: var(--bg2); border: 2px solid var(--accent); max-width: 900px; width: 95%; display: flex; flex-direction: column; position: relative; transition: border-color 0.3s ease, box-shadow 0.3s ease; cursor: default; }
  .yt-modal-content.checked { border-color: var(--done); box-shadow: 0 0 40px rgba(57, 255, 20, 0.4); }
  .yt-close-btn { position: absolute; top: -36px; right: 0; background: transparent; border: none; color: var(--text); font-family: 'Space Mono', monospace; font-size: 24px; cursor: pointer; transition: color 0.2s; }
  .yt-close-btn:hover { color: var(--accent2); }
  .yt-row-info { padding: 16px; background: var(--bg); border-top: 1px solid var(--border); }
  .yt-row-info table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .yt-row-info td { padding: 10px 12px; vertical-align: middle; border-bottom: none; }

  /* MOBILE RESPONSIVE FIXES */
  @media (max-width: 768px) {
    body { zoom: 0.75; }
    header, nav, main { padding-left: 16px; padding-right: 16px; }
    .loc-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .loc-stats { justify-content: flex-start; width: 100%; }
    .challenge-table { font-size: 11px; }
    .challenge-table td, .challenge-table th { padding: 8px 6px; }
    .search-box { margin-left: 0; width: 100%; margin-top: 8px; }
  }
</style>
</head>

    <!-- Shielded Player Container (Blocks UI Interactions) -->
    <div style="position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; overflow: hidden;">
      <div id="db-yt-player"></div>
      <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 10; cursor: default; pointer-events: auto;"></div>
    </div>
    
    <div id="yt-row-info" class="yt-row-info"></div>

<script>
let DATA = {};
let currentKey = null;
let currentFilter = 'all';
let searchQuery = '';
let currentSort = { col: null, dir: 1 };

const ORDERED_KEYS = ['Lower Manhattan', 'Black Hubba', 'Jerome Banks', 'Les Coleman Park', 'Pyramid Ledges', 'Philly', 'China Banks', 'Pier 7', 'Global'];
const CSV_LOCATIONS = {};
ORDERED_KEYS.forEach(k => CSV_LOCATIONS[k] = 'data/' + encodeURIComponent(k + '.csv'));
const loadPromises = {};

/* ===============
   YOUTUBE IFRAME API & SEAMLESS UNMUTED LOOP LOGIC
================= */
let player = null;
let ytReady = false;
let timestampTrackerInterval;
let dbStartTime = 0;
let dbEndTime = 0;

// Dynamically inject YouTube API Script
const ytScriptTag = document.createElement('script');
ytScriptTag.src = "https://www.youtube.com/iframe_api";
const firstScriptTag = document.getElementsByTagName('script')[0];
if(firstScriptTag) firstScriptTag.parentNode.insertBefore(ytScriptTag, firstScriptTag);
else document.head.appendChild(ytScriptTag);

window.onYouTubeIframeAPIReady = function() { ytReady = true; };

function extractYTId(urlStr) {
  if (!urlStr) return null;
  const match = urlStr.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/);
  return match ? match[1] : null;
}

function initYTPlayer(videoId, start) {
  if(!ytReady || !window.YT || !window.YT.Player) { 
    setTimeout(() => initYTPlayer(videoId, start), 100); 
    return; 
  }
  
  if(!player) {
    player = new YT.Player('db-yt-player', {
      height: '100%', 
      width: '100%', 
      videoId: videoId,
      playerVars: { 
        'autoplay': 1, 
        'controls': 0, 
        'disablekb': 1, 
        'modestbranding': 1, 
        'rel': 0, 
        'mute': 0, 
        'playsinline': 1, 
        'start': Math.floor(start) 
      },
      events: { 
        'onReady': onPlayerReady,
        'onStateChange': onPlayerStateChange 
      }
    });
  } else {
    player.loadVideoById({videoId: videoId, startSeconds: start});
  }
}

function onPlayerReady(event) {
  event.target.seekTo(dbStartTime);
  event.target.playVideo();
  startHighFrequencyTracker();
}

function startHighFrequencyTracker() {
  if (timestampTrackerInterval) clearInterval(timestampTrackerInterval);
  if (dbEndTime <= 0) return; // Ignore if there is no set end time

  timestampTrackerInterval = setInterval(() => {
    try {
      if (player && typeof player.getCurrentTime === 'function') {
        const currentTime = player.getCurrentTime();
        if (currentTime >= dbEndTime || currentTime < dbStartTime - 0.5) {
          player.seekTo(dbStartTime);
        }
      }
    } catch(e) { 
      clearInterval(timestampTrackerInterval); 
    }
  }, 10); 
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING) {
    startHighFrequencyTracker();
  } else if (event.data === YT.PlayerState.ENDED) {
    player.seekTo(dbStartTime);
    player.playVideo();
  } else {
    clearInterval(timestampTrackerInterval);
  }
}

function openYTModal(key, num, type) {
  const row = DATA[key].rows.find(r => r.num === String(num));
  if(!row) return;

  const url = type === 'time' ? row.link : row.sourceLink;

/* ===============
   SESSIONSIM LOSSLESS BASE36 ENGINE
================= */
const SESSIONSIM = (() => {
    const EMPTY_REF = "IDONTSKATE";
    const FULL_REF = "SESSIONSIM";
    const MAP_SIZES = [73, 45, 7, 21, 23, 82, 14, 68, 2];
    const TOTAL_MAX = 335;
    const B36 = "0123456789abcdefghijklmnopqrstuvwxyz";

    function toB36(n) {
        if (n === 0n) return "0";
        let res = ""; let base = 36n;
        while (n > 0n) { res = B36[Number(n % base)] + res; n /= base; }
        return res;
    }
    function fromB36(s) {
        let res = 0n; let base = 36n;
        for (let i = 0; i < s.length; i++) res = res * base + BigInt(B36.indexOf(s[i]));
        return res;
    }
    function packBits(arr) {
        let mask = 0n;
        for (let i = 0; i < arr.length; i++) { if (arr[i]) mask |= (1n << BigInt(i)); }
        return mask;
    }
    function unpackBits(mask, size) {
        let arr = [];
        for (let i = 0; i < size; i++) { arr.push((mask & (1n << BigInt(i))) !== 0n); }
        return arr;
    }

    return {
        encode: function(state) {
            if (state.total === 0) return EMPTY_REF;
            if (state.total === TOTAL_MAX) return FULL_REF;

            let code = "";
            for (let i = 0; i < 9; i++) {
                const checkedCount = state.maps[i].filter(Boolean).length;
                if (checkedCount === 0) code += EMPTY_REF[i];
                else if (checkedCount === MAP_SIZES[i]) code += FULL_REF[i];
                else code += toB36(packBits(state.maps[i]));
            }
            if (state.total === 0) code += EMPTY_REF[9];
            else if (state.total === TOTAL_MAX) code += FULL_REF[9];
            else code += toB36(BigInt(state.total));
            return code;
        },
        decode: function(input) {
            const code = input.trim();
            if (code.toUpperCase() === EMPTY_REF) return { maps: MAP_SIZES.map(s => new Array(s).fill(false)), total: 0 };
            if (code.toUpperCase() === FULL_REF) return { maps: MAP_SIZES.map(s => new Array(s).fill(true)), total: TOTAL_MAX };

            const tokens = code.match(/[a-z0-9]+|[A-Z]/g);
            if (!tokens || tokens.length !== 10) throw new Error("Invalid Code");

            const state = { maps: [], total: 0 };
            for (let i = 0; i < 9; i++) {
                const t = tokens[i];
                if (t === EMPTY_REF[i]) state.maps.push(new Array(MAP_SIZES[i]).fill(false));
                else if (t === FULL_REF[i]) state.maps.push(new Array(MAP_SIZES[i]).fill(true));
                else state.maps.push(unpackBits(fromB36(t), MAP_SIZES[i]));
            }
            
            const tTotal = tokens[9];
            if (tTotal === EMPTY_REF[9]) state.total = 0;
            else if (tTotal === FULL_REF[9]) state.total = TOTAL_MAX;
            else state.total = Number(fromB36(tTotal));
            return state;
        }
    };
})();

/* ===============
   CORE LOGIC & CSV PARSING
================= */
function parseCsvLine(line) {
  const out = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) { if (c === '"') { if (line[i+1] === '"') { cur += '"'; i++; } else inQ = false; } else cur += c; }
    else { if (c === '"') inQ = true; else if (c === ',') { out.push(cur); cur = ''; } else cur += c; }
  }
  out.push(cur); return out.map(s => s.trim());
}

function secondsFromYoutubeUrl(url) {
    if (!url || typeof url !== 'string') return null;
    const tMatch = url.match(/[?&]t=([a-zA-Z0-9]+)/);
    if (!tMatch) return null;
    const t = tMatch[1];
    if (/^\d+$/.test(t)) return parseInt(t, 10);
    let sec = 0;
    const h = t.match(/(\d+)h/i); if (h) sec += parseInt(h[1], 10) * 3600;
    const m = t.match(/(\d+)m/i); if (m) sec += parseInt(m[1], 10) * 60;
    const s = t.match(/(\d+)s/i); if (s) sec += parseInt(s[1], 10);
    return sec > 0 ? sec : null;
}

function parseLocationCsv(key, text) {
  const lines = text.split(/\r?\n/);
  let headerIdx = -1, col = null;
  for (let i = 0; i < lines.length; i++) {
    const cells = parseCsvLine(lines[i]);
    const trimmed = cells.map(c => c.trim());
    if (trimmed.includes('Time') && trimmed.includes('Stance')) {
      headerIdx = i; const idx = (n) => trimmed.indexOf(n);
      col = { 
        num: idx('#'), time: idx('Time'), url: idx('URL'), start: idx('Start_Seconds'), end: idx('End_Seconds'),
        stance: idx('Stance'), skater: idx('Skater'), trick: idx('Trick'), location: idx('Location'), 
        source: idx('Film Source'), fUrl: idx('Film_URL'), fStart: idx('F_Start_Seconds'), fEnd: idx('F_End_Seconds'), done: idx('Done') 
      };
      break;
    }
  }
  if (!col) return null;
  const rows = [];
  
  const parseNum = (val) => {
      if (!val) return null;
      const n = parseFloat(val.trim());
      return isNaN(n) ? null : n;
  };

  for (let i = headerIdx + 1; i < lines.length; i++) {
    const line = lines[i]; if (!line.trim()) continue;
    const cells = parseCsvLine(line);
    if (!cells[col.stance] || !cells[col.skater]) continue;
    const num = cells[col.num] || (rows.length + 1).toString().padStart(2, '0');
    const saved = localStorage.getItem(`progress_${key}_${num}`);
    let doneVal = (saved !== null) ? parseInt(saved, 10) : 0; 

    let link = col.url >= 0 && cells[col.url] ? cells[col.url] : (isHttpToken(cells[col.time+1]) ? cells[col.time+1] : null);
    let fLink = col.fUrl >= 0 && cells[col.fUrl] ? cells[col.fUrl] : (isHttpToken(cells[col.source+1]) ? cells[col.source+1] : null);
    
    let sSec = parseNum(cells[col.start]);
    let eSec = parseNum(cells[col.end]);
    let fsSec = parseNum(cells[col.fStart]);
    let feSec = parseNum(cells[col.fEnd]);
    
    if (sSec === null && link) sSec = secondsFromYoutubeUrl(link);
    if (fsSec === null && fLink) fsSec = secondsFromYoutubeUrl(fLink);

    rows.push({
      originalKey: key, 
      num, time: cells[col.time], link: link,
      startSec: sSec || 0, endSec: eSec || 0,
      stance: cells[col.stance], skater: cells[col.skater], trick: cells[col.trick],
      location: col.location >= 0 ? cells[col.location] : '',
      source: cells[col.source] || '', sourceLink: fLink,
      fStartSec: fsSec || 0, fEndSec: feSec || 0,
      done: doneVal
    });
  }
  return { rows, total: rows.length, done_count: rows.filter(r => r.done === 1).length, _fromCsv: true };
}

async function ensureLocationLoaded(key) {
  if (!CSV_LOCATIONS[key] || (DATA[key] && DATA[key]._fromCsv)) return;
  if (!loadPromises[key]) {
    loadPromises[key] = fetch(CSV_LOCATIONS[key]).then(r => r.text()).then(text => { DATA[key] = parseLocationCsv(key, text); updateAllProgress(); }).catch(() => { loadPromises[key] = null; });
  }
  await loadPromises[key];
}

function getAllChallenges() {
  const allRows = [];
  ORDERED_KEYS.forEach(key => { if (DATA[key]) allRows.push(...DATA[key].rows); });
  return allRows;
}

function updateAllProgress() {
  let gT = 0, gD = 0;
  Object.keys(DATA).forEach(k => { 
      if(DATA[k] && typeof DATA[k].total === 'number') {
          gT += DATA[k].total; 
          gD += DATA[k].done_count; 
      }
  });
  const pct = gT > 0 ? (gD / gT * 100).toFixed(1) : 0;
  
  document.querySelector('.prog-count').textContent = `${gD} / ${gT}`;
  document.querySelector('.prog-pct').textContent = `${pct}% Complete`;
  document.querySelector('.progress-bar-fill').style.width = pct + '%';
  if(document.querySelector('.total-value')) document.querySelector('.total-value').textContent = `${gD} / ${gT} — ${pct}%`;
  
  document.querySelectorAll('.nav-btn').forEach(btn => {
    const v = btn.dataset.view;
    if (v !== 'home' && DATA[v]) {
      const p = Math.round((DATA[v].done_count / DATA[v].total) * 100);
      btn.querySelector('.nav-pct').textContent = `${DATA[v].done_count}/${DATA[v].total} — ${p}%`;
    }
  });
  
  document.querySelectorAll('.city-location-row').forEach(row => {
    const name = row.querySelector('.loc-link-name').textContent.trim();
    const match = Object.keys(DATA).find(k => name.includes(k) || k.includes(name));
    if (match && DATA[match]) {
      const p = (DATA[match].done_count / DATA[match].total) * 100;
      row.querySelector('.loc-mini-fill').style.width = p + '%';
      if (p >= 100) row.querySelector('.loc-mini-fill').classList.add('complete');
      else row.querySelector('.loc-mini-fill').classList.remove('complete');
      row.querySelector('.loc-mini-pct').textContent = Math.round(p) + '%';
    }
  });
  
  if (currentKey && currentKey !== 'home' && DATA[currentKey]) {
    const panel = document.getElementById(`view-${currentKey}`);
    if (panel) {
      let loc = DATA[currentKey];
      if (currentKey === 'all_challenges') {
         let t = 0, d = 0;
         Object.values(DATA).forEach(obj => { if(obj) { t+=obj.total; d+=obj.done_count; } });
         loc = { total: t, done_count: d };
      }
      
      const vals = panel.querySelectorAll('.loc-stat .val');
      if (vals.length >= 3) {
        vals[0].textContent = loc.done_count;
        vals[1].textContent = loc.total - loc.done_count;
        vals[2].textContent = Math.round((loc.done_count / loc.total) * 100) + '%';
      }
    }
  }
}

function sortTable(key, col) {
  if (currentSort.col === col) { currentSort.dir *= -1; } else { currentSort.col = col; currentSort.dir = 1; }
  const rows = key === 'all_challenges' ? getAllChallenges() : (DATA[key] ? DATA[key].rows : []);
  const wrap = document.getElementById(`table-wrap-${key.replace(/\s/g,'_')}`);
  if (wrap) wrap.innerHTML = buildTable(rows, key);
  updateSticky();
}

function buildTable(rows, key) {
  if(!rows || rows.length === 0) return `<div class="empty-state">No challenges found or data failed to load.</div>`;

  let filtered = rows.filter(r => {
    if (currentFilter === 'done') return r.done === 1;
    if (currentFilter === 'undone') return r.done === 0;
    return true;
  });
  
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(r => 
      r.skater.toLowerCase().includes(q) || r.trick.toLowerCase().includes(q) || r.num.toLowerCase().includes(q) || r.stance.toLowerCase().includes(q) || r.time.toLowerCase().includes(q) || (r.source && r.source.toLowerCase().includes(q))
    );
  }

  if (currentSort.col) {
    filtered.sort((a, b) => {
      let av = a[currentSort.col]; let bv = b[currentSort.col];
      if (currentSort.col === 'num') return (parseInt(av, 10) - parseInt(bv, 10)) * currentSort.dir;
      if (currentSort.col === 'done') return (av - bv) * currentSort.dir;
      av = (av || '').toString().toLowerCase(); bv = (bv || '').toString().toLowerCase();
      return av.localeCompare(bv) * currentSort.dir;
    });
  }

  const isAll = key === 'all_challenges';
  const cols = [
    { label: '#', key: 'num' }, { label: 'Time', key: 'time' }, { label: 'Stance', key: 'stance' }, { label: 'Skater', key: 'skater' }, { label: 'Trick', key: 'trick' },
    ...(isAll ? [{ label: 'Location', key: 'originalKey' }] : []), { label: 'Film Source', key: 'source' }, { label: 'Done', key: 'done' }
  ];

  let html = `<table class="challenge-table"><thead><tr>`;
  cols.forEach(c => {
    const sorted = currentSort.col === c.key;
    const arrow = sorted ? (currentSort.dir === 1 ? ' ↑' : ' ↓') : ' ⇅';
    html += `<th class="${sorted ? 'sorted' : ''}" onclick="sortTable('${key}','${c.key}')">${c.label}<span class="sort-indicator ${sorted ? 'active' : ''}">${arrow}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  filtered.forEach(r => {
    const toggleKey = isAll ? r.originalKey : key;
    html += `<tr class="${r.done === 1 ? 'done-row' : ''}">
      <td>${r.num}</td>
      <td>${r.link ? `<a class="time-link" href="javascript:void(0)" onclick="openYTModal('${toggleKey}','${r.num}','time')">${r.time}</a>` : r.time}</td>
      <td><span class="stance-badge ${r.stance.toLowerCase()}">${r.stance}</span></td>
      <td>${r.skater}</td><td>${r.trick}</td>
      ${isAll ? `<td>${r.originalKey}</td>` : ''}
      <td>${r.sourceLink ? `<a class="source-link" href="javascript:void(0)" onclick="openYTModal('${toggleKey}','${r.num}','source')">${r.source}</a>` : r.source}</td>
      <td class="done-cell"><input type="checkbox" class="done-checkbox" data-key="${toggleKey}" data-num="${r.num}" ${r.done === 1 ? 'checked' : ''} onchange="toggleDone('${toggleKey}','${r.num}',this)"></td>
    </tr>`;
  });
  return html + `</tbody></table>`;
}

function buildPanel(key) {
  const isAll = key === 'all_challenges';
  let loc;
  if (isAll) {
     let t = 0, d = 0;
     Object.values(DATA).forEach(obj => { if(obj) { t += obj.total; d += obj.done_count; }});
     loc = { total: t, done_count: d, rows: getAllChallenges() };
  } else {
     loc = DATA[key] || { total: 0, done_count: 0, rows: [] };
  }

  const pct = loc.total > 0 ? Math.round((loc.done_count / loc.total) * 100) : 0;

  return `
    <div class="spot-header-group">
      <div class="loc-header">
        <div class="loc-title">${isAll ? 'All Challenges' : key}</div>
        <div class="loc-stats">
          <div class="loc-stat"><span class="val">${loc.done_count}</span><span class="key">Done</span></div>
          <div class="loc-stat"><span class="val">${loc.total - loc.done_count}</span><span class="key">Remaining</span></div>
          <div class="loc-stat"><span class="val">${pct}%</span><span class="key">Complete</span></div>
        </div>
      </div>
      <button class="back-home-btn" onclick="showView('home')" style="margin-bottom:0;">← Home</button>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
        <button class="filter-btn" onclick="setFilter('undone',this)">Remaining</button>
        <input class="search-box" type="text" placeholder="Search #, Stance, Skater..." oninput="setSearch(this.value)">
      </div>
    </div>
    <div id="table-wrap-${key.replace(/\s/g,'_')}">${buildTable(loc.rows, key)}</div>
    <div class="footer-nav"><button class="back-home-btn" onclick="showView('home')">← Home</button></div>
  `;
}

function toggleDone(key, num, cb) {
  if (!DATA[key] || !DATA[key].rows) return;
  const row = DATA[key].rows.find(r => r.num === num);
  if (row) {
    row.done = cb.checked ? 1 : 0;
    localStorage.setItem(`progress_${key}_${num}`, row.done);
    DATA[key].done_count = DATA[key].rows.filter(r => r.done === 1).length;
    
    // Sync table row UI safely via data attributes
    document.querySelectorAll(`.done-checkbox[data-key="${key}"][data-num="${num}"]`).forEach(checkbox => {
        checkbox.checked = row.done === 1;
        const tr = checkbox.closest('tr');
        if (tr) tr.classList.toggle('done-row', row.done === 1);
    });
    
    // Sync modal UI dynamically if open
    const ytModal = document.getElementById('yt-modal');
    if (ytModal && ytModal.classList.contains('visible') && ytModal.dataset.key === key && ytModal.dataset.num === String(num)) {
        const content = ytModal.querySelector('.yt-modal-content');
        if (content) content.classList.toggle('checked', row.done === 1);
    }

    updateAllProgress();
  }
}

function resetAllProgress() {
  if (confirm("Wipe your local progress entirely? This cannot be undone.")) { 
    localStorage.clear(); 
    location.reload(); 
  }
}

/* ===============
   MODAL UI LOGIC & EXPORT
================= */
function closeModal() { document.getElementById('save-modal').classList.remove('visible'); }

document.getElementById('save-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

async function handleExport() {
  await Promise.all(ORDERED_KEYS.map(k => ensureLocationLoaded(k)));
  let t = 0;
  const maps = ORDERED_KEYS.map(k => {
    if(!DATA[k]) return [];
    const arr = DATA[k].rows.map(r => r.done === 1);
    t += arr.filter(Boolean).length;
    return arr;
  });
  
  const code = SESSIONSIM.encode({ maps, total: t });
  
  document.getElementById('modal-title').innerText = "Export Save Code";
  document.getElementById('modal-desc').innerText = "Copy this strict 10-character code to restore your exact progress on another device.";
  const input = document.getElementById('modal-input');
  input.value = code; input.readOnly = true;
  
  const btn = document.getElementById('modal-action-btn');
  btn.innerText = "Copy to Clipboard";
  btn.onclick = () => {
    navigator.clipboard.writeText(code).catch(()=>{});
    input.select(); document.execCommand("copy"); // fallback
    btn.innerText = "Copied!";
    setTimeout(() => btn.innerText = "Copy to Clipboard", 2000);
  };
  document.getElementById('save-modal').classList.add('visible');
}

function handleImport() {
  document.getElementById('modal-title').innerText = "Import Save Code";
  document.getElementById('modal-desc').innerText = "Paste your 10-character code below. WARNING: Overwrites current progress.";
  const input = document.getElementById('modal-input');
  input.value = ""; input.readOnly = false;
  
  const btn = document.getElementById('modal-action-btn');
  btn.innerText = "Load Progress";
  btn.onclick = async () => {
    const code = input.value.trim();
    if(code) {
      try {
        await Promise.all(ORDERED_KEYS.map(k => ensureLocationLoaded(k)));
        const state = SESSIONSIM.decode(code);
        if(!state) { alert("Invalid code format."); return; }
        
        ORDERED_KEYS.forEach((k, i) => {
          if(DATA[k] && DATA[k].rows) {
            DATA[k].rows.forEach((r, idx) => {
              const v = state.maps[i][idx] ? 1 : 0;
              r.done = v;
              localStorage.setItem(`progress_${k}_${r.num}`, v);
            });
            DATA[k].done_count = DATA[k].rows.filter(r => r.done === 1).length;
          }
        });
        updateAllProgress();
        closeModal();
        if(currentKey && currentKey !== 'home') showView(currentKey);
      } catch (e) { alert("Invalid save code format."); }
    }
  };
  document.getElementById('save-modal').classList.add('visible');
}

/* ===============
   SCROLL & VIEW LOGIC 
================= */
function updateSticky() {
  const header = document.getElementById('main-header');
  const activePanel = document.getElementById(`view-${currentKey}`);
  
  if (currentKey === 'home' || !activePanel) {
    header.style.transform = 'translateY(0)';
    return;
  }

  const spotGroup = activePanel.querySelector('.spot-header-group');
  const ths = activePanel.querySelectorAll('.challenge-table th');

  if (window.scrollY > 50) {
    header.style.transform = 'translateY(-100%)';
    if (spotGroup) {
       spotGroup.style.top = '0px';
       ths.forEach(th => th.style.top = spotGroup.offsetHeight + 'px');
    }
  } else {
    header.style.transform = 'translateY(0)';
    if (spotGroup) {
       spotGroup.style.top = header.offsetHeight + 'px';
       ths.forEach(th => th.style.top = (header.offsetHeight + spotGroup.offsetHeight) + 'px');
    }
  }
}

window.addEventListener('scroll', updateSticky);
window.addEventListener('resize', updateSticky);

async function showView(view) {
  document.querySelectorAll('.home-panel, .location-panel').forEach(p => p.classList.remove('visible'));
  currentKey = view; currentFilter = 'all'; searchQuery = ''; currentSort = { col: null, dir: 1 };
  
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  
  if (view === 'home') { 
    document.getElementById('view-home').classList.add('visible'); 
  } else {
    let panel = document.getElementById(`view-${view}`);
    if (!panel && view === 'all_challenges') {
        panel = document.createElement('div');
        panel.id = `view-all_challenges`;
        panel.className = 'location-panel';
        document.querySelector('main').appendChild(panel);
    }

    if (panel) {
      if (view === 'all_challenges') {
        await Promise.all(ORDERED_KEYS.map(k => ensureLocationLoaded(k)));
      } else {
        await ensureLocationLoaded(view);
      }
      
      panel.innerHTML = buildPanel(view);
      panel.classList.add('visible');
    }
  }
  window.scrollTo(0, 0);
  setTimeout(updateSticky, 50); 
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const rows = currentKey === 'all_challenges' ? getAllChallenges() : DATA[currentKey].rows;
  const wrap = document.getElementById(`table-wrap-${currentKey.replace(/\s/g,'_')}`);
  if (wrap) wrap.innerHTML = buildTable(rows, currentKey);
  updateSticky();
}

function setSearch(val) {
  searchQuery = val;
  const rows = currentKey === 'all_challenges' ? getAllChallenges() : DATA[currentKey].rows;
  const wrap = document.getElementById(`table-wrap-${currentKey.replace(/\s/g,'_')}`);
  if (wrap) wrap.innerHTML = buildTable(rows, currentKey);
  updateSticky();
}

// Initialization
ORDERED_KEYS.forEach(k => ensureLocationLoaded(k));
document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => showView(b.dataset.view)));
</script>
</body>
